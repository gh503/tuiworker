name: Build and Test

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
  release:
    types: [published]

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-20.04
            target: x86_64-unknown-linux-gnu
            artifact_suffix: linux-glibc2.31

          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            artifact_suffix: linux-glibc2.35

          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_suffix: linux-glibc2.39
          
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_suffix: macos-x86_64

          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_suffix: macos-arm64

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_suffix: windows

    runs-on: ${{ matrix.os }}

    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libssl-dev libasound2-dev

      - name: Run tests (macOS/Windows)
        if: runner.os != 'Linux'
        shell: bash
        run: |
          cargo test --target ${{ matrix.target }} --verbose

      - name: Run tests (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          cargo test --verbose

      - name: Build (macOS/Windows)
        if: runner.os != 'Linux'
        shell: bash
        run: |
          cargo build --release --target ${{ matrix.target }}

      - name: Build (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          cargo build --release

      - name: Get version
        id: version
        shell: bash
        run: |
          VERSION=$(grep '^version = ' Cargo.toml | head -1 | awk -F'"' '{print $2}')
          echo "VERSION=${VERSION}" >> $GITHUB_ENV
          echo "version=${VERSION}"
          
      - name: Upload binary (Linux)
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.artifact_suffix }}
          path: target/release/tuiworker
          retention-days: 30

      - name: Upload binary (macOS)
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.artifact_suffix }}
          path: target/${{ matrix.target }}/release/tuiworker
          retention-days: 30

      - name: Upload binary (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.artifact_suffix }}
          path: target/${{ matrix.target }}/release/tuiworker.exe
          retention-days: 30

  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'release' && github.event.action == 'published'
    
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          
      - name: Display artifacts
        run: |
          echo "Downloaded artifacts:"
          ls -lh artifacts/
          
      - name: Upload to Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/binary-*/tuiworker*
          generate_release_notes: true
          draft: false
          prerelease: false
          fail_on_unmatched_files: true
          token: ${{ secrets.GITHUB_TOKEN }}

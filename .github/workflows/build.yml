name: Build and Test

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            artifact_suffix: linux
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_suffix: macos-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_suffix: macos-arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_suffix: windows

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install musl for static linking (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools musl-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}

      - name: Build
        shell: bash
        run: |
          if [ "${{ matrix.target }}" = "x86_64-unknown-linux-musl" ]; then
            echo "Building static musl binary"

            # Temporarily remove C-dependent modules from workspace
            cp Cargo.toml Cargo.toml.backup
            sed -i -e '/^    "crates\/modules\/mail",$/d' \
                   -e '/^    "crates\/modules\/git",$/d' \
                   -e '/^    "crates\/modules\/terminal",$/d' \
                   -e '/^    "crates\/modules\/music",$/d' \
                   -e '/^    "crates\/modules\/project",$/d' \
                   Cargo.toml

            # Static linking for Linux using musl
            export RUSTFLAGS="-C target-feature=+crt-static -C link-arg=-s"

            cargo build --release --target ${{ matrix.target }} \
              --no-default-features \
              --features "static-build"

            # Restore workspace configuration
            mv Cargo.toml.backup Cargo.toml
          else
            echo "Building dynamic binary with all features"
            cargo build --release --target ${{ matrix.target }}
          fi

      - name: Run tests
        run: |
          cargo test --target ${{ matrix.target }} --verbose

      - name: Upload binary (Unix)
        if: runner.os != 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.artifact_suffix }}
          path: target/${{ matrix.target }}/release/tuiworker
          retention-days: 30

      - name: Upload binary (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.artifact_suffix }}
          path: target/${{ matrix.target }}/release/tuiworker.exe
          retention-days: 30

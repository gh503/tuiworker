name: Build and Test

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          # Core version - musl static, all Linux
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            artifact_suffix: linux-static
            features: --no-default-features
          
          # Full version 1 - Ubuntu 20.04 (GLIBC 2.31) - broader compatibility
          - os: ubuntu-20.04
            target: x86_64-unknown-linux-gnu
            artifact_suffix: linux-glibc2.31
            features: --default-features
          
          # Full version 2 - Ubuntu 22.04 (GLIBC 2.35) - moderate compatibility
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            artifact_suffix: linux-glibc2.35
            features: --default-features
          
          # Full version 3 - Ubuntu 24.04 (GLIBC 2.39) - latest systems
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_suffix: linux-glibc2.39
            features: --default-features
          
          # macOS
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_suffix: macos-x86_64
            features: --default-features
          
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_suffix: macos-arm64
            features: --default-features
          
          # Windows
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_suffix: windows
            features: --default-features

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - name: Install cross (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          cargo install cross --git https://github.com/cross-rs/cross

      - name: Install system dependencies (Linux dynamic)
        if: runner.os == 'Linux' && matrix.target != 'x86_64-unknown-linux-musl'
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libssl-dev libasound2-dev

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}

      - name: Run tests
        run: |
          if [ "${{ matrix.target }}" = "x86_64-unknown-linux-musl" ]; then
            # For static build, only test core packages
            cargo test -p core -p logging -p storage -p filebrowser -p todo --target ${{ matrix.target }} --verbose
          else
            # For dynamic build, test all packages
            cargo test --target ${{ matrix.target }} --verbose
          fi

      - name: Build
        shell: bash
        run: |
          if [ "${{ matrix.target }}" = "x86_64-unknown-linux-musl" ]; then
            cross build --release --target ${{ matrix.target }} \
              --no-default-features
          else
            cross build --release --target ${{ matrix.target }}
          fi

      - name: Upload binary (Unix)
        if: runner.os != 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.artifact_suffix }}
          path: target/${{ matrix.target }}/release/tuiworker
          retention-days: 30

      - name: Upload binary (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.artifact_suffix }}
          path: target/${{ matrix.target }}/release/tuiworker.exe
          retention-days: 30

name: Build and Test

on:
  push:
    branches: [main, master]
    tags:
      - 'v*.*.*'
  pull_request:
    branches: [main, master]
  workflow_dispatch:
  release:
    types: [published]

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            artifact_suffix: linux-glibc2.35

          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_suffix: linux-glibc2.39

          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_suffix: macos-x86_64

          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_suffix: macos-arm64

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_suffix: windows

    runs-on: ${{ matrix.os }}

    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libssl-dev libasound2-dev

      - name: Run tests (macOS/Windows)
        if: runner.os != 'Linux'
        shell: bash
        run: |
          cargo test --target ${{ matrix.target }} --verbose

      - name: Run tests (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          cargo test --verbose

      - name: Build (macOS/Windows)
        if: runner.os != 'Linux'
        shell: bash
        run: |
          cargo build --release --target ${{ matrix.target }}

      - name: Build (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          cargo build --release

      - name: Get version
        id: version
        shell: bash
        run: |
          VERSION=$(grep '^version = ' Cargo.toml | head -1 | awk -F'"' '{print $2}')
          echo "VERSION=${VERSION}" >> $GITHUB_ENV
          echo "version=${VERSION}"
          
      - name: Upload binary (Linux)
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.artifact_suffix }}
          path: target/release/tuiworker
          retention-days: 30

      - name: Upload binary (macOS)
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.artifact_suffix }}
          path: target/${{ matrix.target }}/release/tuiworker
          retention-days: 30

      - name: Upload binary (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.artifact_suffix }}
          path: target/${{ matrix.target }}/release/tuiworker.exe
          retention-days: 30

  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'release'

    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display artifacts
        run: |
          echo "Downloaded artifacts:"
          ls -lh artifacts/

      - name: Prepare binary for packaging
        run: |
          echo "=== Copying Linux binary for packaging ==="
          mkdir -p target/release
          # 使用任一Linux二进制
          if [ -f artifacts/binary-linux-glibc2.39/tuiworker ]; then
            cp artifacts/binary-linux-glibc2.39/tuiworker target/release/tuiworker
          elif [ -f artifacts/binary-linux-glibc2.35/tuiworker ]; then
            cp artifacts/binary-linux-glibc2.35/tuiworker target/release/tuiworker
          else
            echo "ERROR: No Linux binary found!"
            exit 1
          fi
          ls -lh target/release/tuiworker
          chmod +x target/release/tuiworker
          # 也复制到 src/target/release 以防 RPM 需要不同的路径
          mkdir -p src/target/release
          cp target/release/tuiworker src/target/release/tuiworker
          echo "Binary copied to:"
          echo "  - target/release/tuiworker (for cargo-deb)"
          echo "  - src/target/release/tuiworker (for cargo-generate-rpm)"

      - name: Build deb package
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libssl-dev libasound2-dev
          cargo install cargo-deb
          # cargo-deb 从根目录运行，binary 在 target/release/tuiworker
          cargo deb --no-build

      - name: Build rpm package
        run: |
          cargo install cargo-generate-rpm
          # cargo-generate-rpm 可能从 src/target 找 binary
          cargo generate-rpm --manifest-path=src/Cargo.toml

      - name: List generated packages
        run: |
          echo "=== Generated packages ==="
          echo "Source binary:"
          ls -lh artifacts/binary-linux-*/tuiworker
          echo "Copied binary:"
          ls -lh src/target/release/tuiworker || echo "Binary not found"
          echo "DEB packages:"
          ls -lh src/target/debian/*.deb || echo "No DEB files found"
          echo "RPM packages:"
          find src/target -name "*.rpm" -type f -exec ls -lh {} \; || echo "No RPM files found"

      - name: Upload to Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/binary-*/tuiworker*
            src/target/debian/*.deb
            src/target/**/*.rpm
          generate_release_notes: true
          draft: false
          prerelease: false
          fail_on_unmatched_files: true
          token: ${{ secrets.GITHUB_TOKEN }}

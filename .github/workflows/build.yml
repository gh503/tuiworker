name: Build and Test

on:
  push:
    branches: [main, master]
    tags:
      - 'v*.*.*'
  pull_request:
    branches: [main, master]
  workflow_dispatch:
  release:
    types: [published]

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            artifact_suffix: linux

          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_suffix: macos-x86_64

          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_suffix: macos-arm64

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_suffix: windows

    runs-on: ${{ matrix.os }}

    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libssl-dev libasound2-dev

      - name: Run tests (macOS/Windows)
        if: runner.os != 'Linux'
        shell: bash
        run: |
          cargo test --target ${{ matrix.target }} --verbose

      - name: Run tests (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          cargo test --verbose

      - name: Build (macOS/Windows)
        if: runner.os != 'Linux'
        shell: bash
        run: |
          cargo build --release --target ${{ matrix.target }}

      - name: Build (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          cargo build --release

      - name: Get version
        id: version
        shell: bash
        run: |
          VERSION=$(grep '^version = ' Cargo.toml | head -1 | awk -F'"' '{print $2}')
          echo "VERSION=${VERSION}" >> $GITHUB_ENV
          echo "version=${VERSION}"
          
      - name: Upload binary (Linux)
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.artifact_suffix }}
          path: target/release/tuiworker
          retention-days: 30

      - name: Upload binary (macOS)
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.artifact_suffix }}
          path: target/${{ matrix.target }}/release/tuiworker
          retention-days: 30

      - name: Upload binary (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.artifact_suffix }}
          path: target/${{ matrix.target }}/release/tuiworker.exe
          retention-days: 30

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display artifacts
        run: |
          echo "Downloaded artifacts:"
          ls -lh artifacts/

      - name: Prepare binary for packaging
        run: |
          echo "=== Copying Linux binary for packaging ==="
          mkdir -p target/release
          # 使用Linux二进制（glibc 2.35，兼容2.39及更新版本）
          cp artifacts/binary-linux/tuiworker target/release/tuiworker
          ls -lh target/release/tuiworker
          chmod +x target/release/tuiworker
          # 也复制到 src/target/release 以备RPM使用
          mkdir -p src/target/release
          cp target/release/tuiworker src/target/release/tuiworker
          echo "Binary copied to: target/release/tuiworker"

      - name: Build deb package
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libssl-dev libasound2-dev
          cargo install cargo-deb
          # 从src目录运行，保持与RPM一致
          cd src && cargo deb --no-build

      - name: Build rpm package
        run: |
          cargo install cargo-generate-rpm
          # 从src目录运行，路径相对于src/
          cd src && cargo generate-rpm

      - name: List generated packages
        run: |
          echo "=== Generated packages ==="
          echo "Source binary:"
          ls -lh artifacts/binary-linux/tuiworker
          echo "DEB packages:"
          ls -lh src/target/debian/*.deb || echo "No DEB files found"
          echo "RPM packages:"
          ls -lh src/target/generate-rpm/*.rpm || echo "No RPM files found"

      - name: Prepare artifacts for upload
        run: |
          echo "Renaming binaries to avoid conflicts..."
          mkdir -p release-artifacts
          cp artifacts/binary-linux/tuiworker release-artifacts/tuiworker-linux
          cp artifacts/binary-macos-x86_64/tuiworker release-artifacts/tuiworker-macos-x86_64
          cp artifacts/binary-macos-arm64/tuiworker release-artifacts/tuiworker-macos-arm64
          cp artifacts/binary-windows/tuiworker.exe release-artifacts/tuiworker-windows.exe
          ls -lh release-artifacts/

      - name: Upload to Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            release-artifacts/*
            target/debian/*.deb
            src/target/generate-rpm/*.rpm
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') || contains(github.ref, 'rc') || contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
          fail_on_unmatched_files: false
          token: ${{ secrets.GITHUB_TOKEN }}

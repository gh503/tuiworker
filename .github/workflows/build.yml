name: Build and Test

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
  release:
    types: [published]

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            artifact_suffix: linux-static
            features: --no-default-features
          
          - os: ubuntu-20.04
            target: x86_64-unknown-linux-gnu
            artifact_suffix: linux-glibc2.31
            features: --default-features
          
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            artifact_suffix: linux-glibc2.35
            features: --default-features
          
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_suffix: linux-glc2.39
            features: --default-features
          
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_suffix: macos-x86_64
            features: --default-features
          
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_suffix: macos-arm64
            features: --default-features
          
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_suffix: windows
            features: --default-features

    runs-on: ${{ matrix.os }}

    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - name: Install cross (Linux only)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          cargo install cross --git https://github.com/cross-rs/cross

      - name: Install system dependencies (Linux dynamic)
        if: runner.os == 'Linux' && matrix.target != 'x86_64-unknown-linux-musl'
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libssl-dev libasound2-dev

      - name: Run tests
        shell: bash
        run: |
          if [ "${{ matrix.target }}" = "x86_64-unknown-linux-musl" ]; then
            cargo test -p core -p logging -p storage -p filebrowser -p todo --target ${{ matrix.target }} --verbose
          else
            cargo test --target ${{ matrix.target }} --verbose
          fi

      - name: Build
        shell: bash
        run: |
          if [ "${{ matrix.target }}" = "x86_64-unknown-linux-musl" ]; then
            cross build --release --target ${{ matrix.target }} \
              --no-default-features
          elif [[ "${{ matrix.os }}" == *"mac"* ]]; then
            # macOS: Native build, no cross needed
            cargo build --release --target ${{ matrix.target }} --features "${{ matrix.features }}"
          elif [[ "${{ matrix.os }}" == *"windows"* ]]; then
            # Windows: Use cargo directly, cross doesn't work on Windows
            cargo build --release --target ${{ matrix.target }} --features "${{ matrix.features }}"
          else
            cross build --release --target ${{ matrix.target }}
          fi

      - name: Get version
        id: version
        shell: bash
        run: |
          VERSION=$(grep '^version = ' Cargo.toml | head -1 | sed 's/version = "// v\(.*\) = \(.*\)/\2/' | tr -d '"')
          echo "VERSION=${VERSION}" >> $GITHUB_ENV
          echo "version=${VERSION}"
          
      - name: Upload binary (Unix)
        if: runner.os != 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.artifact_suffix }}
          path: target/${{ matrix.target }}/release/tuiworker
          retention-days: 30

      - name: Upload binary (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.artifact_suffix }}
          path: target/${{ matrix.target }}/release/tuiworker.exe
          retention-days: 30

  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'release' && github.event.action == 'published'
    
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          
      - name: Display artifacts
        run: |
          echo "Downloaded artifacts:"
          ls -lh artifacts/
          
      - name: Upload to Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/binary-*/tuiworker*
          generate_release_notes: true
          draft: false
          prerelease: false
          fail_on_unmatched_files: true
          token: ${{ secrets.GITHUB_TOKEN }}

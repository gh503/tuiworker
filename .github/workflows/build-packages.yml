name: Build Packages

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      publish_release:
        description: 'Publish to current release'
        required: false
        type: boolean
        default: false

jobs:
  build-deb:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libssl-dev libasound2-dev

      - name: Install cargo-deb
        run: cargo install cargo-deb

      - name: Build tuiworker
        run: cargo build --release

      - name: Build deb package
        run: cargo deb --no-build

      - name: Upload deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: tuiworker.deb
          path: target/debian/*.deb
          retention-days: 30

      - name: Upload deb to Release
        if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && inputs.publish_release == true)
        uses: softprops/action-gh-release@v1
        with:
          files: target/debian/*.deb
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-rpm:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libssl-dev libasound2-dev

      - name: Install cargo-generate-rpm
        run: cargo install cargo-generate-rpm

      - name: Build tuiworker
        run: cargo build --release

      - name: Build rpm package
        run: cargo generate-rpm --output=target/rpm/tuiworker.rpm

      - name: Upload rpm artifact
        uses: actions/upload-artifact@v4
        with:
          name: tuiworker.rpm
          path: target/rpm/*.rpm
          retention-days: 30

      - name: Upload rpm to Release
        if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && inputs.publish_release == true)
        uses: softprops/action-gh-release@v1
        with:
          files: target/rpm/*.rpm
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
